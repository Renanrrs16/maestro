name: Build and run Maestro tests (Native Android)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  maestro-cloud:
    runs-on: ubuntu-latest
    outputs:
      app: app/build/outputs/apk/debug
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: 'temurin'
      - run: ./gradlew assembleDebug
      - uses: mobile-dev-inc/action-maestro-cloud@v2.0.2
        with:
          api-key: rb_SQkQCyUZEWHBNiy46E3TYzxZxqfqsCcQYXJqxwgJkTLU7m5JwkZMztvWRPNEytZl1vIpBqu8rsJrz4CGMxUQUCqOlzDBGanHeeK
          # note that you can supply the project id any way you like, it is not secret
          project-id: proj_01kjbftdsye4f9dqavy9nhs0fz
          app-file: qazandofood.apk